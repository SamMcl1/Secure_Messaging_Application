<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; connect-src 'self' http://localhost:5000; script-src 'self' 'wasm-unsafe-eval' https://cdn.jsdelivr.net; style-src 'self'">
    <title>Secure Messaging</title>
    <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>

<div id="auth-panel">
    <div class="auth-card">
        <h1>Secure Messaging</h1>
        <p class="tagline">End-to-end encrypted · HPKE · AES-256-GCM</p>

        <div class="auth-divider"></div>

        <div id="login-view">
            <h2>Sign in</h2>
            <input type="text"     id="login-username" placeholder="Username" autocomplete="username">
            <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
            <button id="login-btn">Continue</button>
            <p class="switch">No account? <a href="#" id="show-register">Register</a></p>
        </div>

        <div id="register-view" hidden>
            <h2>Create account</h2>
            <input type="text"     id="reg-username" placeholder="Username" autocomplete="username">
            <input type="password" id="reg-password" placeholder="Password (min 8 chars)" autocomplete="new-password">
            <button id="register-btn">Create account</button>
            <p class="switch">Already registered? <a href="#" id="show-login">Sign in</a></p>
        </div>

        <p id="auth-error" class="error" hidden></p>
    </div>
</div>

<div id="app-panel" hidden>
    <header>
        <span class="logo">Secure Messaging</span>
        <span id="logged-in-as"></span>
        <button id="logout-btn" class="secondary small">Sign out</button>
    </header>

    <main>
        <section id="compose-section">
            <h2>New message</h2>
            <input type="text" id="send-to" placeholder="Recipient username" autocomplete="off">
            <textarea id="message-body" rows="5" placeholder="Write a message…"></textarea>
            <button id="send-btn">Encrypt &amp; send</button>
            <p id="send-status"></p>
        </section>

        <section id="inbox-section">
            <h2>Inbox <button id="refresh-btn" class="secondary small">Refresh</button></h2>
            <p id="inbox-status"></p>
            <ul id="message-list"></ul>
        </section>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/argon2-browser@1.18.0/dist/argon2-bundled.min.js"
        integrity="sha384-XOR3aNvHciLPIf6r+2glkrmbBbLmIJ1EChMXjw8eBKBf8gE0rDq1TyUNuRdorOqi"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/js-sha3@0.9.3/src/sha3.min.js"
        integrity="sha384-qmlWQX2DZ9z7wD0BjuRUhx3R/TgSeRpscnpKcx0kFaM1eSc9ToGux7t8h/tyP61W"
        crossorigin="anonymous"></script>
<script src="js/app.js"></script>
</body>
</html>
